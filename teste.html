<!DOCTYPE html>
<html>
<head>
  <title>Landing Page do Food Truck/Cafeteria</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <style>
    /* Estilos para o header */
header {
  background-color: #f8f8f8;
  padding: 20px;
}

header h1 {
  margin: 0;
}

nav ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
}

nav ul li {
  display: inline;
  margin-right: 10px;
}

nav ul li a {
  text-decoration: none;
  color: #333;
}

/* Estilos para as seções */
section {
  padding: 50px;
}

section h2 {
  margin-top: 0;
}

/* Estilos para o rodapé */
footer {
  background-color: #f8f8f8;
  padding: 20px;
  text-align: center;
}

/* Estilos gerais */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
}

  </style>
</head>
<body>
  <header>
    <h1>Nome do Food Truck/Cafeteria</h1>
    <nav>
      <ul>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <section id="sobre">
    <h2>Sobre</h2>
    <p>Descrição da sua cafeteria ou food truck.</p>
  </section>

  <section id="menu">
    <h2>Menu</h2>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
  </section>

  <section id="contato">
    <h2>Contato</h2>
    <p>Informações de contato, como telefone e e-mail.</p>
  </section>

  <footer>
    <p>&copy; 2023 Nome do Food Truck/Cafeteria. Todos os direitos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
